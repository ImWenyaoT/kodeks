name: CI

on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read

jobs:
  test:
    name: Python runtime checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: uv sync

      - name: Typecheck
        run: uv run mypy

      - name: Lint
        run: uv run ruff check

      - name: Test
        run: uv run pytest

      - name: Agent evals
        run: uv run python evals/run_local.py --quiet

      - name: Smoke
        run: uv run python -m kodeks.smoke --in-process

      - name: Build package
        run: uv build
