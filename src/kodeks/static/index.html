<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kodeks</title>
    <style>
      :root {
        --font-kodeks-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC",
          "Segoe UI", "Microsoft YaHei UI", "Helvetica Neue", Arial, sans-serif;
        --font-kodeks-mono: "SF Mono", ui-monospace, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        --shell: #eef2ff;
        --panel: #ffffff;
        --panel-muted: #f8fafc;
        --panel-raised: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --faint: #94a3b8;
        --border: #e2e8f0;
        --strong: #020617;
        --strong-text: #ffffff;
        --composer: #ffffff;
        --assistant: #ffffff;
        --user: #ededed;
        --runtime: #f8fafc;
        --accent: #2563eb;
        --ready: #10b981;
        --warn: #f59e0b;
        --danger: #e11d48;
        --radius-panel: 16px;
        --radius-control: 10px;
        color-scheme: light;
      }

      [data-theme="dark"] {
        --shell: #1b1d21;
        --panel: #202428;
        --panel-muted: #24282d;
        --panel-raised: #202428;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --faint: #64748b;
        --border: #343a40;
        --strong: #f8fafc;
        --strong-text: #020617;
        --composer: #24282d;
        --assistant: #111827;
        --user: #27272a;
        --runtime: #24282d;
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--shell);
        color: var(--text);
        font-family: var(--font-kodeks-sans);
        font-size: 13px;
        line-height: 1.46;
        letter-spacing: 0;
        text-rendering: optimizeLegibility;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        appearance: none;
        border: 0;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
      }

      [hidden] {
        display: none !important;
      }

      .app-shell {
        display: flex;
        gap: 10px;
        height: 100dvh;
        min-height: 0;
        padding: 8px;
        background: var(--shell);
      }

      .workspace-wrap,
      .tools-wrap {
        min-height: 0;
        overflow: hidden;
        transition: width 160ms ease;
      }

      .workspace-wrap {
        width: 64px;
        flex: 0 0 auto;
      }

      .tools-wrap {
        width: 64px;
        flex: 0 0 auto;
      }

      .workspace-wrap.expanded {
        width: 260px;
      }

      .tools-wrap.expanded {
        width: 340px;
      }

      .panel {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: var(--radius-panel);
        background: var(--panel);
        color: var(--text);
        box-shadow: 0 1px 2px rgb(15 23 42 / 0.04);
      }

      .rail {
        align-items: center;
        padding: 12px 8px;
      }

      .main-card {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: var(--radius-panel);
        background: var(--panel);
        box-shadow: 0 1px 2px rgb(15 23 42 / 0.04);
      }

      .chat-layout {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        min-height: 0;
        padding: 16px;
      }

      .chat-column {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: min(100%, 750px);
        height: 100%;
        min-height: 0;
      }

      .messages {
        display: flex;
        min-height: 0;
        flex: 1;
        flex-direction: column;
        gap: 20px;
        overflow-y: auto;
        padding: 8px 24px 4px;
        scrollbar-width: thin;
        scrollbar-color: #d6d3d1 transparent;
      }

      [data-theme="dark"] .messages {
        scrollbar-color: #3f3f46 transparent;
      }

      .message {
        max-width: min(100%, 640px);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-size: 15px;
        line-height: 1.66;
      }

      .message.user {
        align-self: flex-end;
        border-radius: 16px;
        background: var(--user);
        padding: 8px 16px;
        color: var(--text);
      }

      .message.assistant {
        align-self: flex-start;
        border-radius: 16px;
        background: var(--assistant);
        padding: 8px 16px;
        color: var(--text);
      }

      .message.runtime,
      .tool-card,
      .approval {
        align-self: flex-start;
        width: min(100%, 560px);
        border-radius: 14px;
        background: var(--runtime);
        padding: 10px 12px;
        color: var(--muted);
        font-family: var(--font-kodeks-mono);
        font-size: 12px;
        line-height: 1.55;
      }

      .composer-shell {
        flex-shrink: 0;
        padding: 12px 12px 4px;
      }

      .composer {
        display: flex;
        flex-direction: column;
        gap: 8px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--composer);
        padding: 10px 10px 10px 18px;
        box-shadow: 0 1px 2px rgb(15 23 42 / 0.06);
      }

      .selected-files-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        min-height: 0;
      }

      .file-chip {
        max-width: 210px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        border-radius: 999px;
        background: var(--panel-muted);
        padding: 4px 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
      }

      .composer-row {
        display: flex;
        align-items: flex-end;
        gap: 10px;
      }

      textarea {
        width: 100%;
        min-height: 76px;
        resize: none;
        border: 0;
        background: transparent;
        color: var(--text);
        outline: none;
        padding: 8px 0 18px;
        font-size: 15px;
        line-height: 1.6;
      }

      textarea::placeholder {
        color: var(--faint);
      }

      .send-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--strong);
        color: var(--strong-text);
        transition: opacity 120ms ease;
      }

      .send-button:hover {
        opacity: 0.75;
      }

      .send-button:disabled {
        background: #d7d7d7;
        color: #f4f4f4;
        opacity: 1;
      }

      .stop-row {
        display: none;
        justify-content: flex-end;
      }

      .stop-row.visible {
        display: flex;
      }

      .soft-button,
      .icon-button,
      .primary-button,
      .segment-button,
      .file-button,
      .session-button {
        border-radius: var(--radius-control);
        color: var(--text);
        transition:
          background 120ms ease,
          color 120ms ease,
          border-color 120ms ease;
      }

      .icon-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        background: transparent;
        color: var(--muted);
      }

      .icon-button:hover,
      .soft-button:hover,
      .file-button:hover,
      .session-button:hover {
        background: var(--panel-muted);
        color: var(--text);
      }

      .primary-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        min-height: 36px;
        border-radius: 999px;
        background: var(--strong);
        color: var(--strong-text);
        padding: 8px 12px;
        font-weight: 600;
      }

      .soft-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 32px;
        background: var(--panel-muted);
        padding: 7px 12px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 56px;
        padding: 0 16px;
      }

      .panel-title {
        font-size: 15px;
        font-weight: 600;
        line-height: 1.33;
      }

      .panel-body {
        display: flex;
        min-height: 0;
        flex: 1;
        flex-direction: column;
        gap: 20px;
        overflow-y: auto;
        padding: 0 12px 16px;
        scrollbar-width: thin;
        scrollbar-color: #d6d3d1 transparent;
      }

      .section {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .section-title {
        padding: 0 4px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        line-height: 1.34;
        text-transform: uppercase;
      }

      .caption {
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
        line-height: 1.34;
      }

      .session-list,
      .file-list,
      .runtime-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .session-button {
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr);
        gap: 8px;
        min-height: 48px;
        background: transparent;
        padding: 8px 10px;
        text-align: left;
      }

      .session-button.active,
      .file-button.active {
        background: var(--panel-muted);
      }

      .session-main {
        min-width: 0;
      }

      .session-title,
      .session-meta,
      .truncate {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .session-title {
        font-size: 13px;
        line-height: 1.46;
      }

      .session-meta {
        color: var(--faint);
        font-size: 12px;
        font-weight: 500;
      }

      .picker-card,
      .debug-section,
      .bridge-card {
        border-radius: 14px;
        background: var(--panel-muted);
        padding: 12px;
      }

      .picker-card {
        display: none;
        border: 1px solid var(--border);
        background: var(--panel);
      }

      .picker-card.open {
        display: block;
      }

      input,
      select {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: var(--radius-control);
        background: var(--panel);
        color: var(--text);
        outline: none;
        padding: 8px 10px;
        font-size: 12px;
        font-weight: 600;
      }

      .file-list {
        max-height: 224px;
        overflow-y: auto;
        padding-right: 4px;
      }

      .file-button {
        display: grid;
        grid-template-columns: 14px minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        min-height: 32px;
        background: transparent;
        padding: 6px 8px;
        text-align: left;
      }

      .file-box {
        width: 12px;
        height: 12px;
        border: 1px solid var(--border);
        border-radius: 3px;
      }

      .file-button.active {
        background: var(--strong);
        color: var(--strong-text);
      }

      .file-button.active .file-box {
        border-color: var(--strong-text);
        background: var(--strong-text);
      }

      .rail-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        margin-top: auto;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--strong);
        color: var(--strong-text);
        font-size: 11px;
        font-weight: 700;
      }

      .rail-icons {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }

      .rail-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: var(--radius-control);
        background: #dbeafe;
        color: #1d4ed8;
      }

      .rail-icon:nth-child(2) {
        background: #fef3c7;
        color: #b45309;
      }

      .rail-icon:nth-child(3) {
        background: #d1fae5;
        color: #047857;
      }

      .rail-icon:nth-child(4) {
        background: #fae8ff;
        color: #a21caf;
      }

      .rail-icon:nth-child(5) {
        background: #e0e7ff;
        color: #4338ca;
      }

      .rail-icon:nth-child(6) {
        background: #ffe4e6;
        color: #be123c;
      }

      .debug-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .debug-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 600;
      }

      .debug-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border: 1px solid var(--border);
        border-radius: var(--radius-control);
        background: var(--panel);
        color: var(--muted);
      }

      .segment {
        display: grid;
        gap: 4px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--shell);
        padding: 4px;
      }

      .segment.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .segment.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .segment-button {
        min-height: 28px;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 600;
      }

      .segment-button.active {
        background: var(--panel);
        color: var(--text);
        box-shadow: 0 1px 2px rgb(15 23 42 / 0.05);
      }

      .bridge-card {
        border: 1px solid transparent;
        background: var(--panel);
      }

      .bridge-card.ready {
        border-color: rgb(16 185 129 / 0.35);
      }

      .bridge-card.unavailable {
        border-color: rgb(225 29 72 / 0.35);
      }

      .bridge-card.checking {
        border-color: rgb(245 158 11 / 0.35);
      }

      .bridge-status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--faint);
      }

      .dot.ready {
        background: var(--ready);
      }

      .dot.unavailable {
        background: var(--danger);
      }

      .dot.checking {
        background: var(--warn);
      }

      .readonly-row {
        display: grid;
        grid-template-columns: 84px minmax(0, 1fr);
        align-items: center;
        gap: 8px;
      }

      .readonly-row + .readonly-row {
        margin-top: 8px;
      }

      .readonly-value {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        border: 1px solid var(--border);
        border-radius: var(--radius-control);
        background: var(--panel);
        padding: 7px 10px;
        color: var(--muted);
        font-family: var(--font-kodeks-mono);
        font-size: 12px;
      }

      .grid-two {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .mobile-tools-button {
        display: none;
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 40;
        border-radius: 999px;
        background: var(--panel);
        box-shadow: 0 4px 18px rgb(15 23 42 / 0.12);
      }

      .mobile-drawer {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 50;
        justify-content: flex-end;
        background: rgb(0 0 0 / 0.3);
      }

      .mobile-drawer.open {
        display: flex;
      }

      .mobile-drawer-panel {
        width: min(100%, 420px);
        height: 100%;
        background: var(--shell);
        padding: 14px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }

      @media (min-width: 1536px) {
        .workspace-wrap.auto {
          width: 260px;
        }

        .tools-wrap.auto {
          width: 340px;
        }
      }

      @media (max-width: 900px) {
        .app-shell {
          padding: 0;
        }

        .workspace-wrap,
        .tools-wrap {
          display: none;
        }

        .main-card {
          border: 0;
          border-radius: 0;
        }

        .chat-layout {
          padding: 10px 0;
        }

        .messages {
          padding: 48px 16px 4px;
        }

        .composer-shell {
          padding: 10px 8px 4px;
        }

        .mobile-tools-button {
          display: inline-flex;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell" id="app" data-theme="light">
      <div class="workspace-wrap auto" id="workspace-wrap">
        <aside class="panel rail" id="workspace-rail">
          <button
            class="icon-button"
            id="workspace-expand"
            aria-label="展开侧边栏"
            type="button"
          ></button>
          <button
            class="icon-button"
            id="rail-new-session"
            aria-label="新会话"
            type="button"
          ></button>
          <div class="rail-mark">K</div>
        </aside>
        <aside class="panel" id="workspace-panel" hidden>
          <div class="panel-head">
            <div class="panel-title">Kodeks</div>
            <button
              class="icon-button"
              id="workspace-collapse"
              aria-label="折叠侧边栏"
              type="button"
            ></button>
          </div>
          <div class="panel-body">
            <button class="primary-button" id="new-session" type="button"></button>
            <section class="section">
              <h2 class="section-title" id="sessions-title">最近会话</h2>
              <div class="session-list" id="sessions"></div>
            </section>
            <section class="section">
              <h2 class="section-title" id="file-section-title">文件搜索</h2>
              <p class="caption" id="file-section-description">
                使用本地 workspace 文件作为会话上下文。
              </p>
              <button class="primary-button" id="file-picker-toggle" type="button"></button>
              <div class="caption" id="selected-files">尚未选择文件</div>
              <div class="selected-files-strip" id="selected-file-chips"></div>
              <div class="picker-card" id="file-picker">
                <input id="file-filter" placeholder="搜索 workspace 文件..." type="search" />
                <div class="file-list" id="files"></div>
              </div>
            </section>
          </div>
        </aside>
      </div>

      <section class="main-card">
        <div class="chat-layout">
          <div class="chat-column">
            <div class="messages" id="messages"></div>
            <div class="composer-shell">
              <form class="composer" id="composer">
                <div class="selected-files-strip" id="composer-file-chips"></div>
                <div class="composer-row">
                  <textarea
                    id="input"
                    placeholder="给 Kodeks 发送消息..."
                    rows="2"
                    dir="auto"
                  ></textarea>
                  <button
                    class="send-button"
                    id="send"
                    type="submit"
                    aria-label="发送消息"
                  ></button>
                </div>
                <div class="stop-row" id="stop-row">
                  <button class="soft-button" id="stop" type="button"></button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </section>

      <div class="tools-wrap auto" id="tools-wrap">
        <aside class="panel rail" id="tools-rail">
          <button
            class="icon-button"
            id="tools-expand"
            aria-label="展开侧边栏"
            type="button"
          ></button>
          <div class="rail-icons" id="rail-icons"></div>
        </aside>
        <aside class="panel" id="tools-panel" hidden>
          <div class="panel-head">
            <h1 class="panel-title" id="debug-title">调试</h1>
            <button
              class="icon-button"
              id="tools-collapse"
              aria-label="折叠侧边栏"
              type="button"
            ></button>
          </div>
          <div class="panel-body">
            <section class="debug-section">
              <div class="debug-title">
                <span class="debug-icon" data-icon="hub"></span>
                <span id="bridge-title">MoonBridge</span>
              </div>
              <div class="bridge-card checking" id="bridge-card">
                <div class="bridge-status">
                  <span class="dot checking" id="bridge-dot"></span>
                  <span id="bridge">正在预检</span>
                  <button
                    class="icon-button"
                    id="bridge-refresh"
                    aria-label="重新预检 MoonBridge"
                    type="button"
                  ></button>
                </div>
                <p class="caption" id="bridge-message">
                  正在确认当前 provider 的状态...
                </p>
              </div>
              <div id="bridge-details"></div>
            </section>

            <section class="debug-section">
              <div class="debug-title">
                <span class="debug-icon" data-icon="smart_toy"></span>
                <span id="appearance-title">外观</span>
              </div>
              <div class="segment three" id="theme-segment"></div>
              <div class="segment three" id="language-segment"></div>
            </section>

            <section class="debug-section">
              <div class="debug-title">
                <span class="debug-icon" data-icon="terminal"></span>
                <span id="runtime-title">运行设置</span>
              </div>
              <div class="grid-two">
                <label>
                  <span class="caption" id="provider-label">模型服务</span>
                  <select id="provider"></select>
                </label>
                <label>
                  <span class="caption" id="model-label">模型</span>
                  <select id="model"></select>
                </label>
              </div>
              <label>
                <span class="caption" id="reasoning-label">推理强度</span>
                <select id="reasoning">
                  <option value="low">低</option>
                  <option value="medium">中</option>
                  <option value="high">高</option>
                  <option value="xhigh">极高</option>
                </select>
              </label>
              <div id="runtime-summary"></div>
            </section>

            <section class="debug-section">
              <div class="debug-title">

      // Builds one inline SVG icon with the same material-style visual language as the old UI.
      function icon(name, size = 18) {
        const path = icons[name] || icons.code;
        return `<svg aria-hidden="true" focusable="false" width="${size}" height="${size}" viewBox="0 0 24 24"><path d="${path}" fill="currentColor"></path></svg>`;
      }

      // Escapes text before inserting user or model output into the static DOM.
      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      // Reads JSON from the Python API and preserves clear endpoint-level errors.
      async function requestJson(path, options = {}) {
        const response = await fetch(path, options);
        if (!response.ok) {
          throw new Error(`${path} failed with HTTP ${response.status}`);
        }
        return response.json();
      }

      // Resolves current copy from the stored language preference and system language.
      function currentCopy() {
        return copy[state.language];
      }

      // Detects browser language and maps it to the two supported UI languages.
      function systemLanguage() {
        const language = navigator.languages?.[0] || navigator.language || "zh";
        return language.toLowerCase().startsWith("zh") ? "zh" : "en";
      }

      // Detects browser color scheme for the "device" theme option.
      function systemTheme() {
        return matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      // Applies persisted preferences to state before the first API render.
      function loadPreferences() {
        state.languagePreference = localStorage.getItem("kodeks.ui.language") || "system";
        state.themePreference = localStorage.getItem("kodeks.ui.theme") || "system";
        state.language =
          state.languagePreference === "system" ? systemLanguage() : state.languagePreference;
        state.theme =
          state.themePreference === "system" ? systemTheme() : state.themePreference;
        el.app.dataset.theme = state.theme;
      }

      // Persists one UI preference while keeping system-derived rendering immediate.
      function setPreference(kind, value) {
        if (kind === "language") {
          state.languagePreference = value;
          localStorage.setItem("kodeks.ui.language", value);
          state.language = value === "system" ? systemLanguage() : value;
        } else {
          state.themePreference = value;
          localStorage.setItem("kodeks.ui.theme", value);
          state.theme = value === "system" ? systemTheme() : value;
          el.app.dataset.theme = state.theme;
        }
        renderChrome();
      }

      // Renders an icon-only button body and title for accessible rail controls.
      function setIconButton(selector, name, label) {
        const button = document.querySelector(selector);
        button.innerHTML = icon(name, 18);
        button.title = label;
        button.setAttribute("aria-label", label);
      }

      // Updates static labels, segmented controls, and reusable icon slots.
      function renderChrome() {
        const t = currentCopy();
        document.querySelector("#new-session").innerHTML = `${icon("add", 18)}${escapeHtml(t.newSession)}`;
        document.querySelector("#rail-new-session").innerHTML = icon("add", 20);
        document.querySelector("#sessions-title").textContent = t.recentSessions;
        document.querySelector("#file-section-title").textContent = t.fileSearch;
        document.querySelector("#file-section-description").textContent = t.fileDescription;
        el.filePickerToggle.innerHTML = `${icon("folder", 16)}${escapeHtml(t.selectFiles)}`;
        el.fileFilter.placeholder = t.filePlaceholder;
        el.input.placeholder = t.composer;
        el.send.innerHTML = icon("arrow_upward", 20);
        el.stop.innerHTML = `${icon("stop_circle", 15)}${escapeHtml(t.stop)}`;
        document.querySelector("#debug-title").textContent = t.debug;
        document.querySelector("#appearance-title").textContent = t.appearance;
        document.querySelector("#runtime-title").textContent = t.runtime;
        document.querySelector("#bridge-title").textContent = t.bridge;
        document.querySelector("#activity-title").textContent = t.activity;
        document.querySelector("#approvals-title").textContent = t.approvals;
        document.querySelector("#mode-title").textContent = t.mode;
        document.querySelector("#provider-label").textContent = t.provider;
        document.querySelector("#model-label").textContent = t.model;
        document.querySelector("#reasoning-label").textContent = t.reasoning;
        renderSegment(el.modeSegment, state.mode, [
          ["act", t.act],
          ["plan", t.plan],
        ], (value) => {
          state.mode = value;
          renderChrome();
        });
        renderSegment(el.themeSegment, state.themePreference, [
          ["light", t.light],
          ["dark", t.dark],
          ["system", t.system],
        ], (value) => setPreference("theme", value));
        renderSegment(el.languageSegment, state.languagePreference, [
          ["zh", t.zh],
          ["en", t.en],
          ["system", t.system],
        ], (value) => setPreference("language", value));
        for (const node of document.querySelectorAll("[data-icon]")) {
          node.innerHTML = icon(node.dataset.icon, 15);
        }
        setIconButton("#workspace-expand", "dock_to_right", t.expandSidebar || "Expand");
        setIconButton("#workspace-collapse", "dock_to_left", t.collapseSidebar || "Collapse");
        setIconButton("#tools-expand", "dock_to_left", t.expandSidebar || "Expand");
        setIconButton("#tools-collapse", "dock_to_right", t.collapseSidebar || "Collapse");
        setIconButton("#bridge-refresh", "refresh", "Refresh");
        setIconButton("#mobile-tools-open", "menu", "Open");
        setIconButton("#mobile-tools-close", "close", "Close");
        renderRailIcons();
        renderSelectedFiles();
        renderReasoningOptions();
        renderRuntimeSummary();
      }

      // Renders a segmented control from stable option values.
      function renderSegment(target, value, options, onChange) {
        target.replaceChildren();
        for (const [optionValue, label] of options) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `segment-button${optionValue === value ? " active" : ""}`;
          button.textContent = label;
          button.addEventListener("click", () => onChange(optionValue));
          target.append(button);
        }
      }

      // Renders collapsed right-rail tool icons that match the old debug panel density.
      function renderRailIcons() {
        el.railIcons.replaceChildren();
        for (const name of ["smart_toy", "terminal", "code", "memory", "account_tree", "shield"]) {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "rail-icon";
          item.innerHTML = icon(name, 18);
          item.addEventListener("click", expandTools);
          el.railIcons.append(item);
        }
      }

      // Renders reasoning effort labels in the current UI language.
      function renderReasoningOptions() {
        const options = currentCopy().reasoningOptions;
        for (const option of el.reasoning.options) {
          option.textContent = options[option.value];
        }
        el.reasoning.value = state.reasoning;
      }

      // Adds one chat, runtime, or approval message to the central transcript.
      function appendMessage(kind, text) {
        const item = document.createElement("div");
        item.className = `message ${kind}`;
        item.textContent = text;
        el.messages.append(item);
        el.messages.scrollTop = el.messages.scrollHeight;
        return item;
      }

      // Resets the timeline to the localized welcome message.
      function renderWelcome() {
        el.messages.replaceChildren();
        appendMessage("assistant", currentCopy().welcome);
      }

      // Adds one compact runtime event row in the right diagnostic panel.
      function appendRuntime(text) {
        state.activityCount += 1;
        const item = document.createElement("button");
        item.type = "button";
        item.className = "soft-button";
        item.textContent = text;
        el.runtime.prepend(item);
        renderRuntimeSummary();
      }

      // Renders the right panel summary rows from session and activity state.
      function renderRuntimeSummary() {
        const t = currentCopy();
        el.runtimeSummary.innerHTML = `
          ${readonlyRow(t.session, state.sessionId || t.autoSession)}
          ${readonlyRow(t.runtimeEvents, String(state.activityCount))}
        `;
      }

      // Builds one read-only setting row for the diagnostic panel.
      function readonlyRow(label, value) {
        return `<div class="readonly-row"><span class="caption">${escapeHtml(label)}</span><div class="readonly-value" title="${escapeHtml(value)}">${escapeHtml(value)}</div></div>`;
      }

      // Loads the secret-free configured model catalog and keeps MoonBridge hidden from user selection.
      async function loadModels() {
        const catalog = await requestJson("/api/models");
        state.models = Array.isArray(catalog.models)
          ? catalog.models.filter((model) => model && model.configured)
          : [];
        const selected =
          state.models.find((model) => model.ref === catalog.primary) || state.models[0];
        if (selected) {
          state.selectedModel = selected.ref;
          state.activeProvider = selected.providerId;
        }
        renderModelControls();
        await refreshBridge();
      }

      // Renders provider and model selects from configured model options.
      function renderModelControls() {
        const providers = [...new Set(state.models.map((model) => model.providerId))];
        if (!state.activeProvider && providers.length > 0) {
          state.activeProvider = providers[0];
        }
        el.provider.replaceChildren();
        for (const provider of providers) {
          const option = document.createElement("option");
          option.value = provider;
          option.textContent = provider;
          el.provider.append(option);
        }
        el.provider.value = state.activeProvider;
        const providerModels = state.models.filter(
          (model) => model.providerId === state.activeProvider,
        );
        if (!providerModels.some((model) => model.ref === state.selectedModel)) {
          state.selectedModel = providerModels[0]?.ref || "";
        }
        el.model.replaceChildren();
        for (const model of providerModels) {
          const option = document.createElement("option");
          option.value = model.ref;
          option.textContent = model.modelName;
          el.model.append(option);
        }
        el.model.value = state.selectedModel;
      }

      // Loads session history and preserves the current active marker.
      async function loadSessions() {
        const body = await requestJson("/api/sessions");
        el.sessions.replaceChildren();
        const sessions = Array.isArray(body.sessions) ? body.sessions : [];
        if (sessions.length === 0) {
          const empty = document.createElement("div");
          empty.className = "caption";
          empty.textContent = currentCopy().noSessions;
          el.sessions.append(empty);
          return;
        }
        for (const session of sessions.slice(0, 20)) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `session-button${session.id === state.sessionId ? " active" : ""}`;
          button.innerHTML = `
            <span>${icon(session.mode === "plan" ? "account_tree" : "terminal", 15)}</span>
            <span class="session-main">
              <span class="session-title">${escapeHtml(session.title || session.id)}</span>
              <span class="session-meta">${escapeHtml(formatSessionTime(session.updatedAt))}</span>
            </span>
          `;
          button.addEventListener("click", () => selectSession(session.id));
          el.sessions.append(button);
        }
      }

      // Formats a session timestamp into a compact local display value.
      function formatSessionTime(updatedAt) {
        const date = new Date(updatedAt);
        if (Number.isNaN(date.getTime())) return updatedAt || "";
        return new Intl.DateTimeFormat(undefined, {
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        }).format(date);
      }

      // Loads the workspace files once, then renders the filtered picker list.
      async function loadFiles() {
        const body = await requestJson("/api/workspace/files");
        state.files = Array.isArray(body.files) ? body.files : [];
        renderFiles();
      }

      // Renders the visible file picker, preserving selected file state.
      function renderFiles() {
        const t = currentCopy();
        const query = el.fileFilter.value.trim().toLowerCase();
        const files = state.files
          .filter((file) => file.toLowerCase().includes(query))
          .slice(0, 80);
        el.files.replaceChildren();
        if (files.length === 0) {
          const empty = document.createElement("div");
          empty.className = "caption";
          empty.textContent = t.noFileMatches;
          el.files.append(empty);
          return;
        }
        for (const file of files) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `file-button${state.selectedFiles.has(file) ? " active" : ""}`;
          button.innerHTML = `<span class="file-box"></span><span class="truncate">${escapeHtml(file)}</span>`;
          button.title = file;
          button.addEventListener("click", () => toggleFile(file));
          el.files.append(button);
        }
      }

      // Toggles one selected workspace file and updates chips in both sidebar and composer.
      function toggleFile(file) {
        if (state.selectedFiles.has(file)) {
          state.selectedFiles.delete(file);
        } else {
          state.selectedFiles.add(file);
        }
        renderSelectedFiles();
        renderFiles();
      }

      // Renders selected file count and compact chips near the composer.
      function renderSelectedFiles() {
        const t = currentCopy();
        const selected = [...state.selectedFiles];
        el.selectedFiles.textContent =
          selected.length === 0 ? t.noFilesSelected : t.selectedFileCount(selected.length);
        for (const target of [el.selectedFileChips, el.composerFileChips]) {
          target.replaceChildren();
          for (const file of selected.slice(0, 4)) {
            const chip = document.createElement("button");
            chip.type = "button";
            chip.className = "file-chip";
            chip.textContent = file;
            chip.title = file;
            chip.addEventListener("click", () => toggleFile(file));
            target.append(chip);
          }
          if (selected.length > 4) {
            const chip = document.createElement("span");
            chip.className = "file-chip";
            chip.textContent = `+${selected.length - 4}`;
            target.append(chip);
          }
        }
      }

      // Loads one persisted transcript and renders its visible messages.
      async function selectSession(sessionId) {
        const body = await requestJson(`/api/sessions/${sessionId}`);
        state.sessionId = sessionId;
        el.messages.replaceChildren();
        for (const message of body.messages || []) {
          if (message.role === "user" || message.role === "assistant") {
            const text = extractText(message.content);
            if (text.trim()) appendMessage(message.role, text);
          }
        }
        if (!el.messages.children.length) renderWelcome();
        await loadSessions();
        renderRuntimeSummary();
      }

      // Extracts user-visible text from stored transcript JSON content.
      function extractText(content) {
        if (typeof content === "string") return content;
        if (content && typeof content === "object" && typeof content.text === "string") {
          return content.text;
        }
        if (Array.isArray(content)) {
          return content
            .map((part) => (part && typeof part.text === "string" ? part.text : ""))
            .filter(Boolean)
            .join("\n");
        }
        return JSON.stringify(content);
      }

      // Runs the server-side bridge preflight for the currently selected model.
      async function refreshBridge() {
        renderBridge({ status: "checking", provider: "auto" });
        try {
          const body = await requestJson("/api/bridge/preflight", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ model: state.selectedModel }),
          });
          renderBridge(body);
        } catch (error) {
          renderBridge({
            status: "unavailable",
            provider: "auto",
            reason: error.message,
          });
        }
      }

      // Renders bridge status and diagnostic details in the right panel.
      function renderBridge(body) {
        const t = currentCopy();
        const status = body.status || "unavailable";
        const title =
          status === "ready"
            ? t.ready
            : status === "not_required"
              ? t.notRequired
              : status === "checking"
                ? t.checking
                : t.unavailable;
        el.bridge.textContent = title;
        el.bridgeCard.className = `bridge-card ${status}`;
        el.bridgeDot.className = `dot ${status}`;
        el.bridgeMessage.textContent = body.reason || t.bridgeMessage;
        el.bridgeDetails.innerHTML = [
          readonlyRow(t.provider, body.resolvedProvider || body.provider || "auto"),
          readonlyRow("Bridge", body.bridgeBaseURL || t.notConfigured),
          readonlyRow("Upstream", body.upstreamBaseURL || t.notConfigured),
          readonlyRow(t.model, body.upstreamModel || body.bridgeModel || t.notConfigured),
        ].join("");
      }

      // Sends one chat turn to the Python SSE endpoint and streams UI updates.
      async function sendChat(input) {
        appendMessage("user", input);
        const assistant = appendMessage("assistant", "");
        state.isRunning = true;
        state.abortController = new AbortController();
        renderRunningState();
        const response = await fetch("/api/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          signal: state.abortController.signal,
          body: JSON.stringify({
            input,
            session_id: state.sessionId || undefined,
            mode: state.mode,
            model: state.selectedModel,
            reasoning_effort: state.reasoning,
            selected_files: [...state.selectedFiles],
          }),
        });
        if (!response.ok || !response.body) {
          throw new Error(`chat failed with HTTP ${response.status}`);
        }
        await readSse(response.body, (event) => handleRuntimeEvent(event, assistant));
        state.isRunning = false;
        state.abortController = null;
        renderRunningState();
        await loadSessions();
      }

      // Maps one runtime SSE event into the chat timeline and side panels.
      function handleRuntimeEvent(event, assistant) {
        if (event.type === "session_created") {
          state.sessionId = event.session_id;
          renderRuntimeSummary();
          return;
        }
        if (event.type === "text_delta") {
          assistant.textContent += event.delta || "";
          el.messages.scrollTop = el.messages.scrollHeight;
          return;
        }
        if (event.type === "approval_required") {
          renderApproval(event);
          return;
        }
        if (event.type === "error") {
          assistant.textContent += currentCopy().runtimeFailed(event.message || "runtime error");
          appendRuntime(event.code || "error");
          return;
        }
        appendRuntime(event.type);
      }

      // Renders an approval request with approve/reject actions.
      function renderApproval(event) {
        const card = document.createElement("div");
        card.className = "approval";
        card.innerHTML = `<div>${escapeHtml(event.message || "Approval required")}</div>`;
        const row = document.createElement("div");
        row.className = "composer-row";
        for (const decision of ["approve", "reject"]) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "soft-button";
          button.textContent = decision;
          button.addEventListener("click", () => decideApproval(event.approval_id, decision));
          row.append(button);
        }
        card.append(row);
        el.approvals.prepend(card);
        appendMessage("runtime", event.message || "Approval required");
      }

      // Sends an approval decision back to the Python runtime.
      async function decideApproval(id, decision) {
        const response = await requestJson(`/api/approvals/${id}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ decision }),
        });
        appendRuntime(`approval ${decision}: ${id}`);
        const summary = formatApprovalResult(response);
        if (summary) appendMessage("runtime", summary);
      }

      // Formats approval execution output for the transcript.
      function formatApprovalResult(response) {
        if (!response || !response.result) return "";
        const result = response.result;
        const lines = [`approval result: exit ${result.exitCode ?? "n/a"}`];
        if (result.stdout) lines.push(`stdout:\n${result.stdout}`);
        if (result.stderr) lines.push(`stderr:\n${result.stderr}`);
        return lines.join("\n");
      }

      // Reads an SSE stream and parses JSON data frames incrementally.
      async function readSse(stream, onEvent) {
        const reader = stream.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { done, value } = await reader.read();
          buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
          let boundary = buffer.indexOf("\n\n");
          while (boundary !== -1) {
            const frame = buffer.slice(0, boundary);
            buffer = buffer.slice(boundary + 2);
            parseFrame(frame, onEvent);
            boundary = buffer.indexOf("\n\n");
          }
          if (done) break;
        }
        if (buffer.trim()) parseFrame(buffer, onEvent);
      }

      // Parses one SSE frame into the Kodeks runtime event object.
      function parseFrame(frame, onEvent) {
        const data = frame
          .split("\n")
          .filter((line) => line.startsWith("data: "))
          .map((line) => line.slice(6))
          .join("\n");
        if (!data || data === "[DONE]") return;
        try {
          onEvent(JSON.parse(data));
        } catch {
          appendMessage("runtime", "Invalid stream frame");
        }
      }

      // Updates composer buttons and stop controls for the current streaming state.
      function renderRunningState() {
        el.send.disabled = state.isRunning || !el.input.value.trim();
        el.stopRow.classList.toggle("visible", state.isRunning);
      }

      // Expands the left workspace panel while keeping auto mode available on wide screens.
      function expandWorkspace() {
        el.workspaceWrap.classList.add("expanded");
        el.workspaceWrap.classList.remove("auto");
        el.workspaceRail.hidden = true;
        el.workspacePanel.hidden = false;
      }

      // Collapses the left workspace panel into a compact rail.
      function collapseWorkspace() {
        el.workspaceWrap.classList.remove("expanded", "auto");
        el.workspaceRail.hidden = false;
        el.workspacePanel.hidden = true;
      }

      // Expands the right tools panel while keeping auto mode available on wide screens.
      function expandTools() {
        el.toolsWrap.classList.add("expanded");
        el.toolsWrap.classList.remove("auto");
        el.toolsRail.hidden = true;
        el.toolsPanel.hidden = false;
      }

      // Collapses the right tools panel into a compact rail.
      function collapseTools() {
        el.toolsWrap.classList.remove("expanded", "auto");
        el.toolsRail.hidden = false;
        el.toolsPanel.hidden = true;
      }

      // Opens a new blank session and preserves selected global model settings.
      function newSession() {
        state.abortController?.abort();
        state.isRunning = false;
        state.sessionId = "";
        el.approvals.replaceChildren();
        renderWelcome();
        renderRuntimeSummary();
        renderRunningState();
      }

      // Initializes event listeners after all DOM references are ready.
      function bindEvents() {
        document.querySelector("#workspace-expand").addEventListener("click", expandWorkspace);
        document.querySelector("#workspace-collapse").addEventListener("click", collapseWorkspace);
        document.querySelector("#tools-expand").addEventListener("click", expandTools);
        document.querySelector("#tools-collapse").addEventListener("click", collapseTools);
        document.querySelector("#new-session").addEventListener("click", newSession);
        document.querySelector("#rail-new-session").addEventListener("click", newSession);
        document.querySelector("#mobile-tools-open").addEventListener("click", () => el.mobileDrawer.classList.add("open"));
        document.querySelector("#mobile-tools-close").addEventListener("click", () => el.mobileDrawer.classList.remove("open"));
        el.filePickerToggle.addEventListener("click", async () => {
          el.filePicker.classList.toggle("open");
          if (el.filePicker.classList.contains("open") && state.files.length === 0) {
            await loadFiles();
          }
        });
        el.fileFilter.addEventListener("input", renderFiles);
        el.provider.addEventListener("change", async () => {
          state.activeProvider = el.provider.value;
          renderModelControls();
          await refreshBridge();
        });
        el.model.addEventListener("change", async () => {
          state.selectedModel = el.model.value;
          await refreshBridge();
        });
        el.reasoning.addEventListener("change", () => {
          state.reasoning = el.reasoning.value;
        });
        el.bridgeRefresh.addEventListener("click", refreshBridge);
        el.input.addEventListener("input", renderRunningState);
        el.input.addEventListener("keydown", (event) => {
          if (event.key === "Enter" && !event.shiftKey && !state.isRunning) {
            event.preventDefault();
            el.composer.requestSubmit();
          }
        });
        el.stop.addEventListener("click", () => {
          state.abortController?.abort();
          state.isRunning = false;
          renderRunningState();
        });
        el.composer.addEventListener("submit", async (event) => {
          event.preventDefault();
          const input = el.input.value.trim();
          if (!input || state.isRunning) return;
          el.input.value = "";
          renderRunningState();
          try {
            await sendChat(input);
          } catch (error) {
            state.isRunning = false;
            state.abortController = null;
            renderRunningState();
            if (error.name !== "AbortError") {
              appendMessage("runtime", error.message || currentCopy().requestFailed);
            }
          }
        });
      }

      // Boots the static Python UI and loads initial API-backed state.
      async function init() {
        loadPreferences();
        renderChrome();
        renderWelcome();
        bindEvents();
        if (matchMedia("(min-width: 1536px)").matches) {
          expandWorkspace();
          expandTools();
          el.workspaceWrap.classList.add("auto");
          el.toolsWrap.classList.add("auto");
        }
        await Promise.allSettled([loadModels(), loadSessions()]);
        renderRunningState();
      }

      init().catch((error) => {
        appendMessage("runtime", error.message || "UI failed to initialize");
      });
    </script>
  </body>
</html>
